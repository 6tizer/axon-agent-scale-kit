# nginx reverse-proxy config for Axon Dashboard
# Place at: /etc/nginx/sites-available/axon-dashboard
# Enable: sudo ln -s /etc/nginx/sites-available/axon-dashboard /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # Replace with your domain if using a custom hostname

    # ── Static Next.js export ──────────────────────────────────────────────────
    root /home/ubuntu/axon-agent-scale/current/web/frontend/out;
    index index.html;

    # Next.js static export with trailingSlash=true generates path/index.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # ── FastAPI backend (proxied) ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow larger bodies for log responses
        proxy_read_timeout 60s;
        client_max_body_size 1m;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
    gzip_vary       on;

    # ── Cache static assets ────────────────────────────────────────────────────
    # Next.js static export does NOT add content hashes to filenames, so
    # `immutable` would cause stale assets after re-deploy. Use a short TTL
    # instead so browsers re-validate after 1 hour.
    location ~* \.(js|css|woff2?|ico|png|svg|webp)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
}
